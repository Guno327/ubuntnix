name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: ./tests/run.sh

  lint:
    name: Shell lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          files=$(find . -name '*.sh' -not -path './.git/*')
          [ -z "$files" ] || shellcheck $files

  flake:
    name: Flake evaluation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install nix (Ubuntu archive)
        run: |
          sudo apt-get update
          sudo apt-get install -y nix
      - name: Lock and check the flake
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' flake lock
          sudo nix --extra-experimental-features 'nix-command flakes' flake check --no-build
          sudo chown "$USER" flake.lock
      # Ubuntu-native stdenv bootstrap proof (SPEC.md §4.1; issue #6, M1).
      # Note: evaluating packages.x86_64-linux.stdenv-proof above (part of
      # `flake check`) already forces nix/stdenv.nix's fetchTarball pin, so
      # on a freshly-unfilled `unpackedSha256` placeholder the "Lock and
      # check the flake" step above — not this one — is where the expected
      # first-run hash-mismatch surfaces. See nix/stdenv.nix's own
      # "PM ACTION REQUIRED" comment for what to do with that error.
      - name: Build stdenv-proof
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' build .#stdenv-proof -L
          sudo chown "$USER" result
      - name: Assert stdenv-proof output
        run: |
          grep -q 'MARKER=ubuntnix-stdenv-proof-v1' result
          grep -qi 'dpkg' result
          grep -qE 'version [0-9]+\.[0-9]+' result
      - name: Upload flake.lock
        uses: actions/upload-artifact@v4
        with:
          name: flake-lock
          path: flake.lock
