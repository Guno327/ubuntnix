name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: ./tests/run.sh

  lint:
    name: Shell lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          # *.sh anywhere, plus extensionless scripts identified by a
          # bash/sh shebang (e.g. bin/ubx) — see issue #15.
          files=$(
            {
              find . -name '*.sh' -not -path './.git/*' -type f
              grep -rlIE --exclude-dir=.git '^#!(/usr)?/bin/(env +)?(ba)?sh' . || true
            } | sort -u
          )
          [ -z "$files" ] || shellcheck $files

  flake:
    name: Flake evaluation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install nix (Ubuntu archive)
        run: |
          sudo apt-get update
          sudo apt-get install -y nix
      - name: Lock and check the flake
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' flake lock
          sudo nix --extra-experimental-features 'nix-command flakes' flake check --no-build
          sudo chown "$USER" flake.lock
      # Ubuntu-native stdenv bootstrap proof (SPEC.md §4.1; issue #6, M1).
      # `nix/stdenv.nix`'s `unpacked` is an ordinary derivation now (not an
      # eval-time fetch), so `flake check --no-build` above does not force
      # or build it — the expected first-run hash mismatch on a
      # freshly-unfilled `unpackedSha256` placeholder surfaces HERE, when
      # this step actually builds `.#stdenv-proof`, not in "Lock and check
      # the flake". See nix/stdenv.nix's own "PM ACTION REQUIRED" comment
      # for what to do with that error.
      #
      # `--option sandbox relaxed`: `unpacked`'s builder sets
      # `__noChroot = true` (it needs the host's own `/bin/sh` + `tar` to
      # unpack the ubuntu-base tarball — see nix/stdenv.nix's "Bootstrap"
      # comment for why that's the deliberate, hash-pinned crossing point).
      # Nix refuses `__noChroot` derivations under the default sandboxed
      # build mode; relaxed sandboxing is required to build this one.
      - name: Build stdenv-proof
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' --option sandbox relaxed build .#stdenv-proof -L
          sudo chown "$USER" result
      - name: Assert stdenv-proof output
        run: |
          grep -q 'MARKER=ubuntnix-stdenv-proof-v1' result
          grep -qi 'dpkg' result
          grep -qE 'version [0-9]+\.[0-9]+' result
      - name: Upload flake.lock
        uses: actions/upload-artifact@v4
        with:
          name: flake-lock
          path: flake.lock
