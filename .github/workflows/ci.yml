name: CI

on:
  pull_request:
  push:
    branches: [main]
  # regen-lockfile (below) only: manual lockfile regeneration for issue #20
  # -- the PM's own host has no apt (snap confinement), so the resolver can
  # only run here; the PM downloads the artifact and commits it verbatim.
  workflow_dispatch:
    inputs:
      snapshot:
        description: "snapshot.ubuntu.com timestamp (YYYYMMDDThhmmssZ) to resolve against"
        required: false
        default: "20260715T000000Z"

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: ./tests/run.sh

  lint:
    name: Shell lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          # *.sh anywhere, plus extensionless scripts identified by a
          # bash/sh shebang (e.g. bin/ubx) — see issue #15.
          files=$(
            {
              find . -name '*.sh' -not -path './.git/*' -type f
              grep -rlIE --exclude-dir=.git '^#!(/usr)?/bin/(env +)?(ba)?sh' . || true
            } | sort -u
          )
          # -x: follow local `. file` sources (e.g. bin/ubx-guard-apt,
          # -dpkg, -snap each `# shellcheck source=`-tag and `.` in
          # bin/ubx-guard-lib -- a shared, non-executable, no-shebang file
          # that intentionally never appears in $files itself, since it is
          # sourced, never run directly; see its own header). Without -x
          # every one of those three otherwise-clean scripts trips SC1091
          # ("not following"), failing this job on a false positive
          # (GitHub issue #31).
          [ -z "$files" ] || shellcheck -x $files

  flake:
    name: Flake evaluation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install nix (Ubuntu archive)
        run: |
          sudo apt-get update
          sudo apt-get install -y nix
      - name: Lock and check the flake
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' flake lock
          sudo nix --extra-experimental-features 'nix-command flakes' flake check --no-build
          sudo chown "$USER" flake.lock
      # Ubuntu-native stdenv bootstrap proof (SPEC.md §4.1; issue #6, M1).
      # `nix/stdenv.nix`'s `unpacked` is an ordinary derivation now (not an
      # eval-time fetch), so `flake check --no-build` above does not force
      # or build it — the expected first-run hash mismatch on a
      # freshly-unfilled `unpackedSha256` placeholder surfaces HERE, when
      # this step actually builds `.#stdenv-proof`, not in "Lock and check
      # the flake". See nix/stdenv.nix's own "PM ACTION REQUIRED" comment
      # for what to do with that error.
      #
      # `--option sandbox relaxed`: `unpacked`'s builder sets
      # `__noChroot = true` (it needs the host's own `/bin/sh` + `tar` to
      # unpack the ubuntu-base tarball — see nix/stdenv.nix's "Bootstrap"
      # comment for why that's the deliberate, hash-pinned crossing point).
      # Nix refuses `__noChroot` derivations under the default sandboxed
      # build mode; relaxed sandboxing is required to build this one.
      - name: Build stdenv-proof
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' --option sandbox relaxed build .#stdenv-proof -L
          sudo chown "$USER" result
      - name: Assert stdenv-proof output
        run: |
          grep -q 'MARKER=ubuntnix-stdenv-proof-v1' result
          grep -qi 'dpkg' result
          grep -qE 'version [0-9]+\.[0-9]+' result
      # Archive lockfile + snapshot-pinned deb fetching proof (SPEC.md
      # §4.4; issue #7, M1). Depends on every pinned public-tier deb
      # (nix/archive.nix's `debs`), which Nix fetches and hash-verifies
      # against archive.lock.json's pinned sha256s as part of this build.
      #
      # `--option sandbox relaxed`: this proof is built via
      # nix/stdenv.nix's `runInUbuntuBase`, whose builder is ubuntu-base's
      # own `ld-linux` binary — so `ubuntuBase.unpacked` (the one
      # `__noChroot = true` derivation in this project) is a transitive
      # build dependency here too, exactly as for `.#stdenv-proof` above;
      # see nix/archive.nix's own "SANDBOXING NOTE" for the full reasoning.
      - name: Build archive-fetch-proof
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' --option sandbox relaxed build .#archive-fetch-proof -L
          sudo chown "$USER" result
      - name: Assert archive-fetch-proof output
        run: |
          grep -q 'MARKER=ubuntnix-archive-fetch-proof-v1' result
          grep -q 'snapshot=20260715T000000Z' result
          for pkg in ed hello htop jq zlib1g; do
            grep -q "deb name=$pkg " result
          done
          # dpkg-deb + tar actually parsed a fetched .deb inside the
          # ubuntu-native stdenv (dpkg-deb --ctrl-tarfile piped into tar
          # via the loader pattern — see nix/archive.nix for why not
          # --info) and produced real control-file output.
          grep -q 'Package:' result
      # Negative case (issue #7 task item 3): archive-hash-mismatch-proof
      # fetches a real pinned deb's URL but with a deliberately WRONG
      # sha256 (nix/archive.nix's own "DELIBERATELY BROKEN" derivation).
      # This build MUST FAIL — that failure, with Nix's own "hash
      # mismatch" message, is the actual assertion; a successful build
      # here would mean hash verification silently stopped working.
      - name: Build archive-hash-mismatch-proof (expected to fail)
        run: |
          if sudo nix --extra-experimental-features 'nix-command flakes' build .#archive-hash-mismatch-proof -L >mismatch.log 2>&1; then
            echo "archive-hash-mismatch-proof built successfully — it must fail (hash verification is broken)" >&2
            cat mismatch.log
            exit 1
          fi
          grep -qi 'hash mismatch' mismatch.log || {
            echo "archive-hash-mismatch-proof failed, but not with a hash mismatch — unexpected failure mode" >&2
            cat mismatch.log
            exit 1
          }
      # Generated /etc proof (SPEC.md §4.2/§4.3; issue #26, M2):
      # nix/etc.nix's `render` evaluated end to end against a small fixture
      # declaration (two entries: a `text` file and a `text` file with
      # non-default owner/group/mode) -- the one part of this issue that
      # can only be exercised where a real `nix` binary exists; the
      # planner half (bin/ubx-etc) is unit-tested without one under
      # tests/unit/11x (see nix/etc.nix's own header, "What this file is,
      # and what it deliberately is NOT").
      - name: Build etc-proof
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' --option sandbox relaxed build .#etc-proof -L -o result-etc-proof
          sudo chown -R "$USER" result-etc-proof
      - name: Assert etc-proof output tree + manifest
        run: |
          [ -f result-etc-proof/tree/motd ] || { echo "no tree/motd in etc-proof output"; exit 1; }
          [ -f result-etc-proof/tree/app/config.json ] || { echo "no tree/app/config.json in etc-proof output"; exit 1; }
          grep -q 'Welcome to ubuntnix.' result-etc-proof/tree/motd || {
            echo "tree/motd does not contain the declared text"; exit 1;
          }
          [ -f result-etc-proof/manifest.json ] || { echo "no manifest.json in etc-proof output"; exit 1; }
          python3 -c "
import json
m = json.load(open('result-etc-proof/manifest.json'))
assert m['version'] == 1, m
paths = sorted(e['path'] for e in m['entries'])
assert paths == ['app/config.json', 'motd'], paths
cfg = next(e for e in m['entries'] if e['path'] == 'app/config.json')
assert (cfg['owner'], cfg['group'], cfg['mode']) == ('root', 'root', '0640'), cfg
"
      - name: Upload flake.lock
        uses: actions/upload-artifact@v4
        with:
          name: flake-lock
          path: flake.lock

  compose:
    name: Rootfs composition (SPEC.md §4.2/§11 M1; issue #9)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install nix (Ubuntu archive)
        run: |
          sudo apt-get update
          sudo apt-get install -y nix
      # nix/compose.nix's HARDENING step nests a user namespace
      # (`unshare --user --map-root-user`) inside Nix's own build sandbox to
      # get a real chroot for maintainer scripts (see that file's
      # "HARDENING" comment). Ubuntu 24.04 restricts unprivileged user
      # namespaces via an AppArmor knob by default (LP: this is the same
      # restriction that broke Chromium/Electron sandboxes on 24.04
      # runners); GitHub's ubuntu-24.04 runner image has been observed both
      # with and without this loosened, so set it explicitly rather than
      # hoping the image already has it — harmless (`|| true`) if the knob
      # doesn't exist on whatever kernel actually runs this.
      - name: Allow unprivileged user namespaces (needed for compose's nested unshare --user)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      # compose-proof (issue #9 task item 1): ubuntu-base + htop + hello,
      # unpacked and configured inside the hardened chroot, no preseed.
      # `--option sandbox relaxed`: same reason as stdenv-proof/
      # archive-fetch-proof above -- composeRootfs is built via
      # runInUbuntuBase, which transitively depends on the one
      # `__noChroot = true` derivation in this project (nix/stdenv.nix's
      # `ubuntuBase.unpacked`).
      - name: Build compose-proof
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' --option sandbox relaxed build .#compose-proof -L -o result-compose-proof
          sudo chown -R "$USER" result-compose-proof
      # dpkg database consistency (issue #9 CI guidance): both declared
      # packages must have run all the way through preinst -> unpack ->
      # postinst and land in dpkg's normal steady state, never stuck
      # half-installed/half-configured/unpacked -- that would mean a
      # maintainer script failed or was skipped silently.
      - name: Assert compose-proof dpkg database consistency
        run: |
          status="result-compose-proof/var/lib/dpkg/status"
          [ -f "$status" ] || { echo "no dpkg status database in composed rootfs"; exit 1; }
          for pkg in htop hello libnl-3-200 libnl-genl-3-200; do
            grep -A5 "^Package: $pkg\$" "$status" | grep -q '^Status: install ok installed$' || {
              echo "package $pkg is not 'install ok installed' in the composed dpkg database" >&2
              exit 1
            }
          done
          if grep -qE '^Status: install ok (half-installed|unpacked|half-configured|triggers-awaited|triggers-pending)$' "$status"; then
            echo "composed dpkg database has a package stuck mid-configuration" >&2
            grep -B5 -E '^Status: install ok (half-installed|unpacked|half-configured|triggers-awaited|triggers-pending)$' "$status" >&2
            exit 1
          fi
      # compose-preseed-proof (issue #9 task item 2): tzdata preseeded to
      # America/New_York (SPEC.md §6 ubuntnix.debconf primitive) -- proves
      # the preseed answers actually reached tzdata's postinst, since
      # America/New_York is not tzdata's own Etc/UTC fallback.
      - name: Build compose-preseed-proof
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' --option sandbox relaxed build .#compose-preseed-proof -L -o result-compose-preseed-proof
          sudo chown -R "$USER" result-compose-preseed-proof
      - name: Assert debconf preseed effect (tzdata -> America/New_York)
        run: |
          tz_file="result-compose-preseed-proof/etc/timezone"
          [ -f "$tz_file" ] || { echo "no /etc/timezone in the preseeded composed rootfs"; exit 1; }
          [ "$(cat "$tz_file")" = "America/New_York" ] || {
            echo "expected /etc/timezone = America/New_York, got: $(cat "$tz_file")" >&2
            exit 1
          }
          localtime_link="result-compose-preseed-proof/etc/localtime"
          [ -L "$localtime_link" ] || { echo "/etc/localtime is not a symlink in the preseeded composed rootfs"; exit 1; }
          case "$(readlink "$localtime_link")" in
            */America/New_York) ;;
            *) echo "expected /etc/localtime -> .../America/New_York, got: $(readlink "$localtime_link")" >&2; exit 1 ;;
          esac
      # compose-image-proof (issue #9 task item 3): the read-only squashfs
      # image artifact built from compose-proof's already-composed tree.
      - name: Build compose-image-proof
        run: |
          sudo nix --extra-experimental-features 'nix-command flakes' --option sandbox relaxed build .#compose-image-proof -L -o result-compose-image-proof
          sudo chown -R "$USER" result-compose-image-proof
      - name: Assert compose-image-proof artifact
        run: |
          img="result-compose-image-proof/rootfs.squashfs"
          [ -s "$img" ] || { echo "no (non-empty) rootfs.squashfs produced"; exit 1; }
          # squashfs's on-disk magic ("hsqs", the superblock's 0x73717368
          # magic number read little-endian) -- avoids depending on `file`
          # being present on the runner.
          magic="$(head -c4 "$img")"
          [ "$magic" = "hsqs" ] || {
            echo "rootfs.squashfs does not start with the squashfs magic (got: $magic)" >&2
            exit 1
          }
      # Two-run determinism comparison (issue #9 task item 4; SPEC.md §12
      # R1, a TRACKED RISK, not a guarantee): rebuild compose-proof and
      # compare against the first build. `--rebuild` forces Nix to actually
      # redo the build (ignoring the already-valid output from the step
      # above) and fails loudly with a diff-bearing error if the two
      # outputs differ. Per R1 and this issue's own guidance, byte-identical
      # reproducibility is a goal nix/compose.nix works toward (mtime
      # normalization, dpkg.log removal, single-threaded mksquashfs,
      # deterministic dpkg --unpack ordering, PERL_HASH_SEED pinning, a
      # canonical final ldconfig run, and cache-file deletion -- see that
      # file's own R1 inventory comment) but has NOT been independently
      # verified byte-for-byte here before now -- this step is what
      # actually proves or disproves it. STRICT MODE (issue #22, flipped
      # after the first verifiably clean two-run rebuild landed with
      # PR #34's normalizations — run 29799497402): a divergence now FAILS
      # this job, after capturing and uploading a precise recursive diff
      # so the failure is immediately diagnosable from the
      # determinism-diff artifact alone.
      #
      # `--keep-failed` (`-K`): per the Nix reference manual's "Verifying
      # Build Reproducibility" page, a `--rebuild` (new CLI) of an
      # already-valid output is the same "rebuild + compare" mechanism the
      # legacy `nix-build --check` documents -- when the rebuilt output
      # differs from the original AND `-K` is given, Nix leaves the
      # differing second build's result at "<original-output-path>.check"
      # rather than discarding it, instead of the generic "failed build's
      # /tmp directory" `-K` gives an ordinary build failure. That
      # documented ".check" path is the PRIMARY thing this step looks for
      # below. Treated as a documented assumption, not a certainty, for the
      # same reason nix/compose.nix's own HARDENING comment treats its
      # user-namespace assumption that way: this repository's dev harness
      # cannot run `nix` at all (see nix/compose.nix's header), so this
      # exact `nix build --rebuild -K` (as opposed to the legacy
      # `nix-build --check -K` the manual actually documents) has not been
      # observed in this project's own CI before now. If Nix instead keeps
      # the differing build somewhere else, the fallback `grep` over
      # determinism.log's own text below is what catches that case instead.
      - name: Two-run determinism check (compose-proof --rebuild)
        run: |
          set +e
          sudo nix --extra-experimental-features 'nix-command flakes' --option sandbox relaxed build .#compose-proof --rebuild --keep-failed -L >determinism.log 2>&1
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "compose-proof rebuilt bit-for-bit identically across two independent builds (SPEC.md §12 R1: no divergence observed this run)."
            exit 0
          fi

          echo "::error::compose-proof did NOT reproduce bit-for-bit across two independent builds (SPEC.md §12 R1 — strict since issue #22 closed)."
          echo "-- capturing the divergence for the determinism-diff artifact, then failing the job --"
          cat determinism.log

          # The FIRST build's own output path: the `-o result-compose-proof`
          # symlink the "Build compose-proof" step above created still
          # points at it -- a failed --rebuild determinism check never
          # replaces the already-registered valid path with the differing
          # one, so this symlink is unaffected by the failure above.
          orig=""
          if [ -e result-compose-proof ]; then
            orig=$(readlink -f result-compose-proof || true)
          fi

          # Where the differing SECOND build's output might be:
          #   1. the documented -K "<orig>.check" path (primary case, see
          #      this step's own header comment);
          #   2. anything determinism.log itself names, parsed defensively
          #      in case (1)'s exact naming doesn't hold on this Nix
          #      version/runner.
          candidate=""
          if [ -n "$orig" ] && sudo test -e "${orig}.check"; then
            candidate="${orig}.check"
          fi
          if [ -z "$candidate" ]; then
            candidate=$(grep -oE "/nix/store/[^[:space:]'\"]+\.check" determinism.log | head -1)
          fi
          if [ -z "$candidate" ] && [ -n "$orig" ]; then
            # Last resort: any /nix/store/... path mentioned in the log
            # that ISN'T the original output path itself -- covers a kept
            # /tmp build directory being reported some other way, or a
            # differently-named ".check"-less kept path.
            candidate=$(grep -oE "/nix/store/[^[:space:]'\"]+" determinism.log | grep -vF "$orig" | sort -u | tail -1)
          fi

          if [ -n "$candidate" ] && [ -n "$orig" ] && sudo test -e "$candidate" && sudo test -e "$orig"; then
            echo "-- determinism divergence: comparing $orig (build 1) vs $candidate (build 2) --"
            {
              echo "build 1 (first, already-registered): $orig"
              echo "build 2 (second, differing rebuild):  $candidate"
              echo
              echo "-- file-level summary (diff -rq) --"
              sudo diff -rq --no-dereference "$orig" "$candidate"
            } >determinism-summary.txt 2>&1 || true
            sudo diff -r --no-dereference "$orig" "$candidate" >determinism-full.diff 2>&1 || true
            sudo chown "$USER" determinism-summary.txt determinism-full.diff || true
            echo "-- summary (see uploaded determinism-diff artifact for the full recursive diff) --"
            cat determinism-summary.txt
          else
            echo "could not locate the second (differing) build's output path to diff -- see determinism.log above for whatever Nix itself reported." \
              | tee determinism-summary.txt
          fi
          # STRICT (issue #22): the artifacts above carry the diagnosis;
          # the divergence itself is now a hard failure.
          exit 1
      # Uploaded regardless of the outcome above (`if: always()`): the log
      # is useful even on a clean run (confirms `-K` didn't change
      # anything observable), and the diff files only exist at all when a
      # divergence was actually captured -- `if-no-files-found: ignore` on
      # both keeps that expected "nothing to upload" case from itself
      # becoming a spurious failure.
      - name: Upload determinism log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: determinism-log
          path: determinism.log
          if-no-files-found: ignore
      - name: Upload determinism diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: determinism-diff
          path: |
            determinism-summary.txt
            determinism-full.diff
          if-no-files-found: ignore

  resolve:
    name: Archive resolution (apt solver, end-to-end)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # apt-solver-based resolution (SPEC.md §4.4; GitHub issue #8,
      # milestone M1: "the `ubx update` archive-pins portion"). Runs
      # bin/ubx-resolve directly against a real snapshot.ubuntu.com
      # timestamp, using the runner's own apt-get/dpkg-deb — no `sudo`:
      # bin/ubx-resolve's isolated apt rootdir (`-o Dir=...`) touches
      # nothing under /etc/apt, /var/lib/apt, /var/lib/dpkg, or
      # /var/cache/apt on the runner itself (see bin/ubx-resolve's own
      # header for the mechanism). The pinned timestamp below is the same
      # one already proven reachable on snapshot.ubuntu.com by the "flake"
      # job's archive-fetch-proof step above, so this targets a known-good
      # snapshot rather than "whatever's current right now".
      #
      # This resolves into THIS JOB'S OWN ephemeral checkout's
      # archive.lock.json only — every job here gets its own isolated
      # checkout (actions/checkout@v4 above), so overwriting it has zero
      # effect on the "flake" job's checkout, whose archive-fetch-proof
      # assertions are pinned to the COMMITTED lockfile's specific
      # packages/hashes. Nothing in this job pushes any change back to the
      # repository.
      - name: Resolve declared packages against a pinned snapshot (run 1)
        run: |
          ./bin/ubx-resolve \
            --declaration archive.packages.json \
            --snapshot 20260715T000000Z \
            --out archive.lock.json
      - name: Validate the emitted lockfile against the shared schema
        run: python3 tests/lib/validate-archive-lockfile.py archive.lock.json
      # A real apt solve against an EMPTY dpkg status (bin/ubx-resolve's
      # isolated rootdir starts with none) pulls in each declared package's
      # actual runtime dependencies (libc6 and friends) — strictly more
      # than the 5 bare names archive.packages.json declares, and more than
      # the issue #7 hand-built fixture enumerated (see
      # archive.packages.json's own header). tests/lib/check-resolved-
      # closure.py asserts the resolved set is a proper superset of the
      # declared one, by count and by name — kept as a standalone script
      # rather than embedded here so it isn't at the mercy of YAML block-
      # scalar indentation rules.
      - name: Sanity-check the resolved closure
        run: python3 tests/lib/check-resolved-closure.py archive.packages.json archive.lock.json
      # Idempotence (issue #8's explicit acceptance criterion): re-running
      # with UNCHANGED inputs (same declaration file, same --snapshot) must
      # emit a byte-identical lockfile — proves the real, network-driven
      # apt-solve path is deterministic end-to-end, complementing
      # tests/unit/051's fixture-driven proof of the same property for the
      # pure emission logic alone.
      - name: Re-resolve with unchanged inputs (run 2) and diff for byte-identity
        run: |
          cp archive.lock.json /tmp/run1-archive.lock.json
          ./bin/ubx-resolve \
            --declaration archive.packages.json \
            --snapshot 20260715T000000Z \
            --out archive.lock.json
          diff -u /tmp/run1-archive.lock.json archive.lock.json

  regen-lockfile:
    name: Regenerate archive.lock.json (manual, issue #20)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Same mechanism as the `resolve` job above (see its comments), but
      # its OUTPUT is the deliverable: the emitted lockfile is uploaded as
      # an artifact for the PM to download, review, and commit -- the
      # committed archive.lock.json then becomes byte-identical to a fresh
      # resolver run at the pinned snapshot (issue #20's acceptance).
      # Nothing here pushes anything back to the repository.
      - name: Resolve declared packages against the requested snapshot
        run: |
          ./bin/ubx-resolve \
            --declaration archive.packages.json \
            --snapshot "${{ inputs.snapshot }}" \
            --out archive.lock.json
      - name: Validate against the shared schema
        run: python3 tests/lib/validate-archive-lockfile.py archive.lock.json
      - name: Sanity-check the resolved closure
        run: python3 tests/lib/check-resolved-closure.py archive.packages.json archive.lock.json
      - name: Upload the regenerated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: archive.lock.json
          path: archive.lock.json
